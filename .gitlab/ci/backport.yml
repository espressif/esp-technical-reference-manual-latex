# Run when MR is merged: pipeline is triggered by push to target branch (default branch).
# Scripts resolve the merged MR from merge commit message (See merge request ... !IID).
check_needs_backport:
  stage: backport
  tags: [host_test]
  image: $CI_REGISTRY_IMAGE
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
    - python tools/auto_backport/check_needs_backport.py


create_backport_on_merge:
  stage: backport
  tags: [host_test]
  image: $CI_REGISTRY_IMAGE
  needs: [check_needs_backport]
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
    - python tools/auto_backport/create_backport_mr.py
