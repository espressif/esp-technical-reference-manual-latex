stages:
    - prepare
    - secure
    - build
    - deploy
    - backport

variables:
  ESP_DOCS_ENV_IMAGE: "$CI_REGISTRY_IMAGE:latest"

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" # Run pipelines only for merge requests
    - when: always # Fallback rule to always run if no other rules match

include:
    - '.gitlab/ci/prepare.yml'
    - '.gitlab/ci/pre_commit.yml'
    - '.gitlab/ci/secure.yml'
    - '.gitlab/ci/build.yml'
    - '.gitlab/ci/deploy.yml'
    - '.gitlab/ci/backport.yml'

# Exclude paths from secret detection (false positives: CI token URL placeholders in scripts)
secret_detection:
  variables:
    SECRET_DETECTION_EXCLUDED_PATHS: "tools/auto_backport/create_backport_mr.py"
